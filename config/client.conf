# =============================================================================
# SecureSeaHorse Client Configuration -- v5.0.0 (Phases 1-25)
# =============================================================================

# --- Network ---
server_ip = 127.0.0.1
port      = 65432
device_id = 7001

# --- mTLS Certificates ---
ca_path     = certs/ca.crt
client_crt  = certs/client.crt
client_key  = certs/client.key

# --- Logging ---
log_file      = client.log
log_max_bytes = 10485760
log_max_files = 5

# --- [Phase 1] Exponential Backoff ---
backoff_base_ms = 1000
backoff_max_ms  = 60000

# =============================================================================
# PHASE 3: Security & Lifecycle
# =============================================================================
hmac_enabled = true
heartbeat_interval_s = 15
heartbeat_timeout_s  = 45
crl_path =
ocsp_stapling    = true
ocsp_must_staple = false
cert_pin_sha256 =

# =============================================================================
# PHASE 6: File Integrity Monitoring
# =============================================================================
fim_enabled = true
fim_scan_interval_s = 300
# fim_watch_paths = /etc,/usr/sbin,/boot,/var/www
# fim_exclude_ext = .tmp,.log,.swp,.pyc
fim_max_file_size = 104857600
fim_max_files     = 50000
fim_max_depth     = 20

# =============================================================================
# PHASE 11: Process Monitor
# =============================================================================
process_monitor_enabled = true
process_scan_interval_s = 60
process_track_cmdline = true

# =============================================================================
# PHASE 12: Connection Inventory
# =============================================================================
connection_monitor_enabled = true
connection_scan_interval_s = 60

# =============================================================================
# PHASE 13: Session & Auth Tracker
# =============================================================================
session_tracker_enabled = true
session_scan_interval_s = 60

# =============================================================================
# PHASE 14: Software Inventory
# =============================================================================
software_inventory_enabled = true
software_scan_interval_s = 3600

# =============================================================================
# PHASE 17: Agent Self-Protection & Auto-Update  (v3.5)
# =============================================================================
self_protection_enabled = true
tamper_interval_s       = 60
watchdog_stall_s        = 180

# Auto-update: OFF by default. Enable only after you have published a signed
# manifest and verified the pinned public key is in place. Updates are
# atomic and keep the previous binary at seahorse-client.prev for rollback.
autoupdate_enabled      = false
update_manifest_url     = https://updates.securedcybersolutions.co.uk/agent.json
update_pub_key_pem      = /opt/seahorse/client/update_pubkey.pem
update_staging_dir      = /var/lib/seahorse/staging

# =============================================================================
# PHASE 19: USB & Peripheral Monitor  (v4.0)
# =============================================================================
usb_monitor_enabled = true
usb_scan_interval_s = 30

# Optional VID:PID whitelist -- one entry per line, format:
#   <4hex_vid>:<4hex_pid>  <optional description>
# A device not on the list raises a WHITELIST_VIOLATION event.
# usb_whitelist_file = /etc/seahorse/usb_whitelist.conf
usb_whitelist_enforcement = false
