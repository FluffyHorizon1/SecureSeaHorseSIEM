# =============================================================================
# SecureSeaHorse Server Configuration -- v5.0.0 (Phases 1-25)
# =============================================================================

# --- Network ---
port = 65432

# --- mTLS Certificates ---
ca_path     = certs/ca.crt
server_crt  = certs/server.crt
server_key  = certs/server.key

# --- Logging ---
log_file      = server.log
log_max_bytes = 10485760
log_max_files = 5

# --- Legacy Storage (CSV) ---
csv_output = s_log.csv

# --- [Phase 1] Dynamic Thread Pool ---
pool_min            = 2
pool_max            = 32
pool_idle_timeout_s = 30

# =============================================================================
# PHASE 2: Data Intelligence
# =============================================================================
db_enabled  = true
db_host     = 127.0.0.1
db_port     = 5432
db_name     = seahorse
db_user     = seahorse
db_pass     =
rules_file  = rules.conf
alert_enabled = true
alert_log     = alerts.log

# =============================================================================
# PHASE 3: Security & Lifecycle
# =============================================================================
hmac_enabled         = true
connection_timeout_s = 120
crl_path             =
ocsp_stapling        = false

# =============================================================================
# PHASE 4: Traffic Classification
# =============================================================================
classifier_enabled = true
cls_baseline_alpha  = 0.05
cls_baseline_warmup = 20
cls_z_high   = 3.0
cls_z_medium = 2.5
cls_z_low    = 2.0
cls_ddos_inbound_z         = 3.0
cls_ddos_inbound_abs_bytes = 100000000
cls_portscan_refused_min = 10
cls_brute_min_failures = 5
cls_exfil_outbound_z         = 3.0
cls_exfil_outbound_abs_bytes = 50000000
cls_c2_jitter_max = 0.15

# =============================================================================
# PHASE 5: Threat Intelligence Feeds
# =============================================================================
threat_intel_enabled = true
feeds_dir = feeds
feeds_reload_interval_s = 300

# =============================================================================
# PHASE 6: FIM Monitor
# =============================================================================
fim_enabled = true
fim_default_severity = medium

# =============================================================================
# PHASE 7: REST API & Web Dashboard
# =============================================================================
rest_enabled = true
rest_port = 8080
rest_bind = 0.0.0.0
rest_api_token = changeme-seahorse-token-2026

# =============================================================================
# PHASE 8: Incident Response
# =============================================================================
ir_enabled = true
# ir_webhook_url = https://hooks.slack.com/services/YOUR/WEBHOOK/URL
# ir_script_dir = scripts

# =============================================================================
# PHASE 9: Fleet Management
# =============================================================================
fleet_enabled = true
fleet_stale_s = 300
fleet_offline_s = 900

# =============================================================================
# PHASE 10: Network Deep Inspection
# =============================================================================
inspector_enabled = true
inspect_dns = true
inspect_protocol = true
inspect_connections = true
inspect_entropy = true

# =============================================================================
# PHASE 15: Correlation Engine
# =============================================================================
correlation_enabled = true

# =============================================================================
# PHASE 16: Sigma Rule Engine  (v3.5)
# =============================================================================
sigma_enabled    = true
sigma_rules_dir  = config/sigma_rules
sigma_reload_s   = 300

# =============================================================================
# PHASE 18: Reporting & Compliance  (v3.5)
# =============================================================================
reports_enabled    = true
reports_dir        = reports
reports_scheduler  = cron
reports_frameworks = pci,hipaa,soc2

# =============================================================================
# PHASE 20: Multi-Tenancy & RBAC  (v4.0)
# =============================================================================
# When rbac_enabled=true, the REST API requires a JWT from /api/auth/login.
# rest_api_token (Phase 7) remains usable for admin break-glass, gated by
# rbac_allow_legacy_token below.
rbac_enabled          = true
rbac_secret           = changeme-generate-a-long-random-hmac-key
rbac_users_db         = rbac/users.db
rbac_tenants_db       = rbac/tenants.db
rbac_audit_log        = rbac/audit.log
rbac_token_ttl_s      = 28800
rbac_allow_legacy_token = false

# =============================================================================
# PHASE 21: SOAR Integration  (v4.0)
# =============================================================================
soar_enabled        = false
# Backends: generic_webhook | splunk_soar | cortex_xsoar | the_hive
soar_backend        = generic_webhook
# soar_url          = https://soar.example.com/rest/container
# soar_auth_header  = ph-auth-token: YOUR_TOKEN_HERE
# soar_inbound_secret = <hmac-shared-with-soar-to-verify-callbacks>

# =============================================================================
# PHASE 22: Syslog Ingestion & Forwarding  (v4.5)
# =============================================================================
# Leave listen addresses empty to disable the listener. Port 514 requires root
# on Linux; rebind to >1024 or use setcap for unprivileged operation.
syslog_listen_udp      =
syslog_listen_tcp      =
syslog_forward_enabled = false
# syslog_forward_dest   = splunk.example.com:514
# syslog_forward_proto  = udp
# syslog_forward_format = cef

# =============================================================================
# PHASE 23: Hunt Query DSL  (v4.5)
# =============================================================================
# No tunables -- endpoint is /api/hunt. Requires RBAC analyst+ role when
# rbac_enabled=true.

# =============================================================================
# PHASE 24: ML Anomaly Detection  (v4.5)
# =============================================================================
ml_enabled             = true
ml_window_size         = 2048
ml_warmup_samples      = 128
ml_retrain_interval_s  = 300
ml_score_threshold     = 0.65
ml_critical_threshold  = 0.85
ml_forest_trees        = 64
ml_forest_subsample    = 256
ml_beacon_max_jitter   = 0.15
ml_beacon_min_autocorr = 0.35
ml_beacon_min_samples  = 12
ml_beacon_window       = 64

# =============================================================================
# PHASE 25: React Web UI  (v5.0)
# =============================================================================
# The SPA is served as a static file tree at /ui/ (set webui_dir to the build
# output or to the scaffold's src/webui directory). The live event stream at
# /ws/stream requires websocket support in rest_server.h (Phase 25 upgrade).
webui_enabled  = true
webui_dir      = webui
ws_stream_path = /ws/stream
ws_stream_max_buffer = 100
